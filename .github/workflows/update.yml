name: Update Clash Rules

on:
  schedule:
    # 每日 UTC 12:00（北京时间 20:00）
    - cron: '0 12 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o builder ./cmd/builder

      - name: Run builder
        run: ./builder

      - name: Get date
        id: date
        run: echo "tag=$(date -u '+%Y%m%d')" >> $GITHUB_OUTPUT && echo "name=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Push to rules branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -B rules
          git add -f rules/ geoip/
          git diff --staged --quiet || git commit -m "chore: 更新规则文件 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin rules --force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "rules-${{ steps.date.outputs.tag }}"
          name: "Clash Rules ${{ steps.date.outputs.name }}"
          files: |
            rules/*.yaml
            geoip/*.mmdb
          generate_release_notes: true
